<!doctype html>
<html>
	<head>
		<meta http-equiv="content-type" content="text/html; charset=UTF-8">

		<!--                                                               -->
		<!-- Consider inlining CSS to reduce the number of requested files -->
		<!--                                                               -->
		<link type="text/css" rel="stylesheet" href="index.css">
	
		<!--                                           -->
		<!-- Any title is fine                         -->
		<!--                                           -->
		<title>Wrapper HTML for home</title>

		<!--                                           -->
		<!-- This script loads your compiled module.   -->
		<!-- If you add any GWT meta tags, they must   -->
		<!-- be added before this line.                -->
		<!--                                           -->
		<script language="javascript" src="com.icmwind.gui.web.home/com.icmwind.gui.web.home.nocache.js"></script>
		
	</head>

	<!--                                           -->
	<!-- The body can have arbitrary html, or      -->
	<!-- we leave the body empty because we want   -->
	<!-- to create a completely dynamic ui         -->
	<!--                                           -->
	<body>

		<!-- OPTIONAL: include this if you want history support -->
		<iframe id="__gwt_historyFrame" style="width:0;height:0;border:0"></iframe>
		
		<table align="center" width="1024px" height="768" style="padding: 5px;border: 1px solid;">
			<tr>
				<td colspan="2" id="headerContainer" style="width: 950px;height: 50px;font-size: 24px;font-family: Comic Sans MS;text-align: center;border: 1px solid;"></td>
			</tr>
			<tr style="padding: 5px;">
				<td id="navBarContainer" style="vertical-align: top;width: 120px;border: 1px solid;"></td>
				<td id="contentContainer" style="vertical-align: top;width: 800px;border: 1px solid;"></td>
			</tr>
			<tr>
				<td colspan="2" id="footerContainer" align="center" style="width: 950px;height: 50px;border: 1px solid;"></td>
			</tr>
		</table>

	</body>
</html>
